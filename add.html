<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Add Word - My Dictionary</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #E6F0FA;
      text-align: center;
      padding: 50px;
      color: #333;
    }

    .heading-box {
      display: block;
      padding: 20px 40px;
      border: 3px solid #1F3A93;
      border-radius: 12px;
      margin: 0 auto 15px auto;
      background-color: #fff;
      width: fit-content;
    }

    h2 {
      font-size: 28px;
      margin: 0;
    }

    .nav-box {
      display: block;
      padding: 20px 30px;
      border: 3px solid #1F3A93;
      border-radius: 12px;
      margin: 0 auto 40px auto;
      background-color: #fff;
      width: fit-content;
    }

    .nav-box a {
      padding: 12px 25px;
      margin: 5px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      color: white;
      background-color: #2978B5;
      transition: background 0.3s;
      display: inline-block;
    }

    .nav-box a:hover {
      background-color: #1F5A87;
    }

    input {
      padding: 12px;
      width: 280px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 8px 0;
      outline: none;
    }

    input:focus {
      border-color: #50C878;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      background-color: #2978B5;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #1F5A87;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="heading-box">
    <h2>Add a New Word</h2>
  </div>

  <div class="nav-box">
    <a href="add.html">Add Word</a>
    <a href="index.html">Search</a>
    <a href="update.html">Update</a>
    <a href="delete.html">Delete</a>
  </div>

  <div>
    <input type="text" id="word" placeholder="Word" /><br>
    <input type="text" id="meaning" placeholder="Meaning" /><br>
    <input type="text" id="example" placeholder="Example (optional)" /><br>
    <button id="addBtn">Add Word</button>
  </div>

  <p id="status"></p>

  <script>
    const API_URL = 'https://3fs94f0sg8.execute-api.ap-south-1.amazonaws.com/version1';

    function addWord() {
      var word = document.getElementById('word').value.trim();
      var meaning = document.getElementById('meaning').value.trim();
      var example = document.getElementById('example').value.trim();
      var status = document.getElementById('status');

      if (!word || !meaning) {
        status.textContent = "Word and Meaning are required!";
        return;
      }

      var xhr = new XMLHttpRequest();
      xhr.open("POST", API_URL + "/addWord", true);
      xhr.setRequestHeader("Content-Type", "application/json;charset=UTF-8");

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            status.style.color = "#50C878";
            status.textContent = "Word added successfully!";
            document.getElementById('word').value = '';
            document.getElementById('meaning').value = '';
            document.getElementById('example').value = '';
          } else {
            status.style.color = "#FC5A8D";
            status.textContent = "Error adding word!";
          }
        }
      };

      xhr.send(JSON.stringify({
        word: word,
        meaning: meaning,
        example: example
      }));
    }

    document.getElementById('addBtn').addEventListener('click', addWord);
  </script>

</body>
</html>
