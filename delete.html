<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Delete Word - Dictionary</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #E6F0FA;
      text-align: center;
      padding: 50px;
      color: #333;
    }

    .heading-box {
      display: block;
      padding: 20px 40px;
      border: 3px solid #1F3A93;
      border-radius: 12px;
      margin: 0 auto 15px auto;
      background-color: #fff;
      width: fit-content;
    }

    h2 {
      font-size: 28px;
      margin: 0;
    }

    .nav-box {
      display: block;
      padding: 20px 30px;
      border: 3px solid #1F3A93;
      border-radius: 12px;
      margin: 0 auto 40px auto;
      background-color: #fff;
      width: fit-content;
    }

    .nav-box a {
      padding: 12px 25px;
      margin: 5px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      color: white;
      background-color: #2978B5;
      transition: background 0.3s;
      display: inline-block;
    }

    .nav-box a:hover {
      background-color: #1F5A87;
    }

    input {
      padding: 12px;
      width: 280px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 8px 0;
      outline: none;
    }

    input:focus {
      border-color: #50C878;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      background-color: #FC5A8D; /* strawberry red for delete */
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #e04878;
    }

    .message {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="heading-box">
    <h2>Delete Word</h2>
  </div>

  <div class="nav-box">
    <a href="add.html">Add Word</a>
    <a href="index.html">Search</a>
    <a href="update.html">Update</a>
    <a href="delete.html">Delete</a>
  </div>

  <div>
    <input type="text" id="wordBox" placeholder="Enter word to delete" /><br/>
    <button id="deleteBtn">Delete Word</button>
  </div>

  <div class="message" id="statusMsg"></div>

  <script>
    const API_URL = 'https://3fs94f0sg8.execute-api.ap-south-1.amazonaws.com/version1';

    function deleteWord() {
      const word = document.getElementById('wordBox').value.trim();
      const statusMsg = document.getElementById('statusMsg');

      if (!word) {
        statusMsg.style.color = "#FC5A8D";
        statusMsg.textContent = "Word is required!";
        return;
      }

      if (!confirm("Are you sure you want to delete '" + word + "' ?")) {
        return;
      }

      const xhr = new XMLHttpRequest();
      xhr.open("DELETE", API_URL + "/deleteWord?word=" + encodeURIComponent(word), true);

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            const res = JSON.parse(xhr.responseText);
            statusMsg.style.color = "#50C878";
            statusMsg.textContent = res.message || "Word deleted successfully!";
          } else {
            statusMsg.style.color = "#FC5A8D";
            statusMsg.textContent = "Error deleting word!";
          }
        }
      };

      xhr.send();
    }

    document.getElementById('deleteBtn').addEventListener('click', deleteWord);
  </script>

</body>
</html>
