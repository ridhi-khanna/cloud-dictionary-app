<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Fancy Dictionary</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #E6F0FA; /* palest powder blue */
      text-align: center;
      padding: 50px;
      color: #333;
    }

    /* Heading box */
    .heading-box {
      display: block;
      padding: 20px 40px;
      border: 3px solid #1F3A93; /* dark blue border */
      border-radius: 12px;
      margin: 0 auto 15px auto; /* centered + close to nav */
      background-color: #fff;
      width: fit-content;
    }

    h2 {
      font-size: 32px;
      margin: 0;
    }

    /* Navigation buttons box */
    .nav-box {
      display: block;
      padding: 20px 30px;
      border: 3px solid #1F3A93; /* dark blue border */
      border-radius: 12px;
      margin: 0 auto 40px auto; /* centered under heading */
      background-color: #fff;
      width: fit-content;
    }

    .nav-box a {
      padding: 12px 25px;
      margin: 5px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 16px;
      color: white;
      background-color: #2978B5; /* brilliant blue main button */
      transition: background 0.3s;
      display: inline-block;
    }

    .nav-box a:hover {
      background-color: #1F5A87; /* darker blue hover */
    }

    /* Search section */
    .search-container {
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      width: 250px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-right: 10px;
      outline: none;
    }

    input:focus {
      border-color: #50C878; /* emerald for focus */
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 8px;
      background-color: #2978B5; /* brilliant blue */
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #1F5A87; /* darker blue */
    }

    #out {
      text-align: left;
      margin-top: 30px;
      padding: 20px;
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      white-space: pre-wrap;
    }

    .word {
      font-weight: bold;
      color: #50C878; /* emerald for word */
      font-size: 18px;
    }

    .meaning {
      font-style: italic;
      color: #555;
    }

    .example {
      color: #888;
    }
  </style>
</head>
<body>

  <!-- Heading box -->
  <div class="heading-box">
    <h2>My Online Dictionary</h2>
  </div>

  <!-- Navigation buttons box -->
  <div class="nav-box">
    <a href="add.html">Add Word</a>
    <a href="index.html">Search</a>
    <a href="update.html">Update</a>
    <a href="delete.html">Delete</a>
  </div>

  <!-- Search section -->
  <div class="search-container">
    <input id="word" placeholder="Type a word...">
    <button onclick="search()">Search</button>
  </div>

  <pre id="out"></pre>

  <script>
    function search() {
      var w = document.getElementById("word").value;
      var results = document.getElementById("out");
      results.textContent = "Searching...";

      var xhr = new XMLHttpRequest();
      xhr.open("GET", "https://3fs94f0sg8.execute-api.ap-south-1.amazonaws.com/version1/readWord?word=" + encodeURIComponent(w), true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              results.textContent = "";
              if (data.length === 0) {
                results.textContent = "No results found.";
              } else {
                for (var i = 0; i < data.length; i++) {
                  var item = data[i];
                  results.textContent += item.word + ": " + item.meaning + " (Example: " + item.example + ")\n\n";
                }
              }
            } catch(e) {
              results.textContent = "Error parsing response.";
            }
          } else {
            results.textContent = "Error: " + xhr.status;
          }
        }
      };
      xhr.send();
    }
  </script>

</body>
</html>
